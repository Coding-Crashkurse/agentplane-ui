name: release

# Works like the agentplane releases: push a `v*` tag and the Docker image
# (node build stage -> caddy, see Dockerfile) is published to
# ghcr.io/coding-crashkurse/agentplane-ui, tagged with the semver from the
# tag (v1.2.3 -> 1.2.3) plus `latest`. The image contains zero
# environment-specific values (SPEC section 8) — config.json is injected at
# runtime, so the same image serves every deployment.

on:
  push:
    tags: ["v[0-9]*"]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: install
        run: npm ci
      - name: gates (lint, typecheck, test, build)
        run: |
          npm run lint
          npm run typecheck
          npm run test
          npm run build

  publish:
    needs: gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: derive image version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/coding-crashkurse/agentplane-ui:${{ env.VERSION }}
            ghcr.io/coding-crashkurse/agentplane-ui:latest
